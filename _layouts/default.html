<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Apply the saved theme before first paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="John Duncan — home">
        <span class="brand-mark">
          <svg viewBox="0 0 144 80" width="204" height="113" fill="none"
               stroke="currentColor" stroke-width="1.6" role="img" aria-hidden="true"
               font-family="IBM Plex Mono, monospace">
            <!-- edges: name as a factor graph (a nod to PRISM) -->
            <g class="brand-edges">
              <line x1="12" y1="12" x2="36"  y2="12"></line>
              <line x1="36" y1="12" x2="60"  y2="12"></line>
              <line x1="60" y1="12" x2="84"  y2="12"></line>
              <line x1="12" y1="40" x2="36"  y2="40"></line>
              <line x1="36" y1="40" x2="60"  y2="40"></line>
              <line x1="60" y1="40" x2="84"  y2="40"></line>
              <line x1="84" y1="40" x2="108" y2="40"></line>
              <line x1="108" y1="40" x2="132" y2="40"></line>
              <line x1="12" y1="68" x2="36"  y2="68"></line>
              <line x1="36" y1="68" x2="60"  y2="68"></line>
            </g>
            <!-- nodes -->
            <g class="brand-nodes">
              <circle cx="12"  cy="12" r="8" fill="var(--bg)"></circle>
              <circle cx="36"  cy="12" r="8" fill="var(--bg)"></circle>
              <circle cx="60"  cy="12" r="8" fill="var(--bg)"></circle>
              <circle cx="84"  cy="12" r="8" fill="var(--bg)"></circle>
              <circle cx="12"  cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="36"  cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="60"  cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="84"  cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="108" cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="132" cy="40" r="8" fill="var(--bg)"></circle>
              <circle cx="12"  cy="68" r="8" fill="var(--bg)"></circle>
              <circle cx="36"  cy="68" r="8" fill="var(--bg)"></circle>
              <circle cx="60"  cy="68" r="8" fill="var(--bg)"></circle>
            </g>
            <!-- letters -->
            <g fill="currentColor" stroke="none" font-size="9" font-weight="600"
               text-anchor="middle" dominant-baseline="central">
              <text x="12"  y="12">J</text>
              <text x="36"  y="12">O</text>
              <text x="60"  y="12">H</text>
              <text x="84"  y="12">N</text>
              <text x="12"  y="40">D</text>
              <text x="36"  y="40">U</text>
              <text x="60"  y="40">N</text>
              <text x="84"  y="40">C</text>
              <text x="108" y="40">A</text>
              <text x="132" y="40">N</text>
              <text x="12"  y="68">P</text>
              <text x="36"  y="68">H</text>
              <text x="60"  y="68">D</text>
            </g>
          </svg>
        </span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/log/' | relative_url }}">Blog</a>
        <a href="{{ '/resume/' | relative_url }}">Resume</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_user }}/">LinkedIn</a>
        <a href="https://github.com/{{ site.github_user }}">GitHub</a>
        <button type="button" class="theme-toggle" id="theme-toggle"
                aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span class="mono muted">© {{ 'now' | date: "%Y" }} John Duncan</span>
      <span class="footer-links mono">
        <a href="https://github.com/{{ site.github_user }}">github/{{ site.github_user }}</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_user }}/">linkedin</a>
      </span>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var root = document.documentElement;
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      btn.addEventListener('click', function () {
        // Effective theme: an explicit override wins, else fall back to the OS.
        var current = root.getAttribute('data-theme') || (mq.matches ? 'dark' : 'light');
        var next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
