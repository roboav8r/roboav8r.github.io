<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 24" width="40" height="24" fill="none" stroke="currentColor" stroke-width="1.6">
            <line x1="6" y1="18" x2="20" y2="6"></line>
            <line x1="20" y1="6" x2="34" y2="18"></line>
            <line x1="6" y1="18" x2="34" y2="18"></line>
            <circle cx="6" cy="18" r="3" fill="var(--bg)"></circle>
            <circle cx="20" cy="6" r="3" fill="var(--bg)"></circle>
            <circle cx="34" cy="18" r="3" fill="var(--bg)"></circle>
          </svg>
        </span>
        <span class="brand-name">John Duncan</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/log/' | relative_url }}">Build log</a>
        <a href="{{ '/resume/' | relative_url }}">Resume</a>
        <a href="https://github.com/{{ site.github_user }}">GitHub</a>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span class="mono muted">© {{ 'now' | date: "%Y" }} John Duncan</span>
      <span class="footer-links mono">
        <a href="https://github.com/{{ site.github_user }}">github/{{ site.github_user }}</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_user }}/">linkedin</a>
      </span>
    </div>
  </footer>
</body>
</html>
