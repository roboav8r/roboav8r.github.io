---
layout: default
---
<article class="wrap post">
  <header class="post-head">
    <p class="eyebrow mono">Build log · {{ page.date | date: "%Y.%m.%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
    {% if page.tags %}
    <p class="tags mono">{% for t in page.tags %}<span>{{ t }}</span>{% endfor %}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <nav class="post-nav mono">
    <a href="{{ '/log/' | relative_url }}">← All entries</a>
  </nav>
</article>
